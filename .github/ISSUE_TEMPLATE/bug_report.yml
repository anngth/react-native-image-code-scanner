name: 🐛 Bug report
description: Report a reproducible bug or regression in react-native-image-code-scanner.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it.

        - Feature requests → [Discussions / Ideas](https://github.com/anngth/react-native-image-code-scanner/discussions/new?category=ideas)
        - Questions → [Discussions](https://github.com/anngth/react-native-image-code-scanner/discussions)
        - Supported versions → [COMPATIBILITY.md](https://github.com/anngth/react-native-image-code-scanner/blob/main/COMPATIBILITY.md)

  - type: checkboxes
    attributes:
      label: Before you submit
      options:
        - label: I am using the latest version of `react-native-image-code-scanner`
          required: true
        - label: I searched [existing issues](https://github.com/anngth/react-native-image-code-scanner/issues) and did not find a duplicate
          required: true
        - label: My React Native / Expo version is listed in [COMPATIBILITY.md](https://github.com/anngth/react-native-image-code-scanner/blob/main/COMPATIBILITY.md)
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: Project setup
      options:
        - Expo (prebuild)
        - React Native CLI
        - Other
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: Library version
      placeholder: e.g. 1.1.3
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment info
      description: Run `npx react-native info`, or share your Expo SDK and React Native versions if using Expo.
      render: shell
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include error messages, stack traces, or screenshots if helpful.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: code-sample
    attributes:
      label: Minimal code sample
      description: How you call `ImageCodeScanner.scan(...)`, including image `path` source and `formats` if used.
      render: typescript

  - type: input
    id: repro-repo
    attributes:
      label: Reproduction repository
      description: Link to a minimal GitHub repo, if available.
      placeholder: https://github.com/username/repo
